<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Charlotte Resource Hub</title>

    <script async src="https://www.googletagmanager.com/gtag/js?id=G-CY5GRPGCYS"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag(){dataLayer.push(arguments);}
        gtag('js', new Date());

        gtag('config', 'G-CY5GRPGCYS');
    </script>

    <script type="application/ld+json">
        {
            "@context": "https://schema.org",
            "@type": "WebSite",
            "name": "Charlotte Resource Hub",
            "alternateName": "CLT Resource Hub",
            "url": "https://www.cltresourcehub.org/"
        }
    </script>

    <link rel="icon" href="/assets/img/icon.jpg" type="image/x-icon">
    <meta name="description" content=
            "Charlotte Resource Hub is a student-developed community resource hub highlighting local services,
            nonprofits, and programs available to residents across Charlotte, North Carolina." />

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Bree+Serif&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="assets/css/core/global.css">
    <link rel="stylesheet" href="assets/css/index.css">
    <link rel="stylesheet" href="assets/css/nav.css">
    <link rel="stylesheet" href="assets/css/footer.css">
</head>

<body>

<div class="scroll-progress" aria-hidden="true"><span class="scroll-progress__bar" id="scrollProgressBar"></span></div>

<section class="hero">
    <video id="heroVideo" class="hero-video" autoplay muted loop playsinline poster="assets/img/homepage1.jpg">
        <source src="assets/img/clt.mp4" type="video/mp4">
    </video>

    <div id="siteNav"></div>

    <div class="hero-controls">
        <button class="hero-ctrl" id="soundToggle" type="button" aria-label="Toggle sound" aria-pressed="false">
            <span class="ctrl-icon ctrl-icon--a">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                    <path d="M4 9v6h4l5 4V5L8 9H4z" fill="currentColor"/>
                    <path d="M16 9.5l4 5M20 9.5l-4 5" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                </svg>
            </span>
            <span class="ctrl-icon ctrl-icon--b">
                <span class="eq" aria-hidden="true"><i></i><i></i><i></i><i></i></span>
            </span>
        </button>

        <button class="hero-ctrl" id="playToggle" type="button" aria-label="Pause or play video" aria-pressed="true">
            <span class="ctrl-icon ctrl-icon--a">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                    <rect x="6" y="5" width="4" height="14" rx="1.5" fill="currentColor"/>
                    <rect x="14" y="5" width="4" height="14" rx="1.5" fill="currentColor"/>
                </svg>
            </span>
            <span class="ctrl-icon ctrl-icon--b">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                    <path d="M8 5v14l11-7L8 5z" fill="currentColor"/>
                </svg>
            </span>
        </button>
    </div>

    <button class="hero-explore" id="heroExplore" type="button" aria-label="Explore">
        <span class="hero-explore__label">Explore</span>
        <span class="hero-explore__line" aria-hidden="true"></span>
    </button>
</section>

<div id="siteFooter"></div>

<script src="assets/js/core/includes.footer.js" defer></script>
<script src="assets/js/core/includes.nav.js" defer></script>
<script src="assets/js/hero-video.js" defer></script>
<script src="assets/js/hero-scroll.js" defer></script>

</body>
</html>
